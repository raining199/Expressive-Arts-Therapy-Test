            { text: "打开音乐软件，让一首歌替自己把那种感觉宣泄出来", type: TYPE_MUSIC },
            { text: "察觉到这件事好像一直堵在胸口或喉咙，想用深呼吸把它推开", type: TYPE_DANCE },
            { text: "在纸上用某个只有自己懂的抽象符号把它圈住", type: TYPE_VISUAL }
        ] },
        { text: "有人突然问你'最近怎么样'，但你不想说太多。你心里最先跳出的回应方式是？", options: [
            { text: "脑子里立刻蹦出一两句歌词或一段旋律", type: TYPE_MUSIC },
            { text: "手机相册里最近的一张照片，就是我的近况", type: TYPE_VISUAL },
            { text: "想起一个比喻，'就像......'，但没说出口", type: TYPE_DRAMA },
            { text: "不自觉做了一个耸肩、摊手或叹气的表情和姿势", type: TYPE_DANCE }
        ] },
        { text: "回想一下你做过的重要决定，你更偏向靠什么来判断？", options: [
            { text: "心里演了一遍不同选择可能发生的故事，然后才决定", type: TYPE_DRAMA },
            { text: "身体会不会紧绷或松弛，用那个来判断对不对劲", type: TYPE_DANCE },
            { text: "脑子里冒出某个画面或场景，觉得'就是这种感觉'", type: TYPE_VISUAL },
            { text: "凭某种说不清的直觉，像是心里有个声音在响", type: TYPE_MUSIC }
        ] },
        { text: "经历一段难熬的日子后，你感觉自己真正'缓过来了'的标志通常是？", options: [
            { text: "身体突然觉得很轻，想出门走走或者大口吸几口新鲜空气", type: TYPE_DANCE },
            { text: "能把那段时间当故事讲出来了，而且觉得它已经翻篇", type: TYPE_DRAMA },
            { text: "重新开始留意到路边的小细节，比如光影或花朵", type: TYPE_VISUAL },
            { text: "有一天无意识地哼起了歌，而且是轻快的那种", type: TYPE_MUSIC }
        ] },
        { text: "日常生活中，你更容易被哪种东西吸引注意？", options: [
            { text: "别人走路的姿态，或者自己走路时鞋底与地面的触感", type: TYPE_DANCE },
            { text: "飘过来的一段钢琴声、隔壁店铺放的歌", type: TYPE_MUSIC },
            { text: "街边好看的海报、橱窗陈列、或是落日的光线", type: TYPE_VISUAL },
            { text: "听到路人对话的一两句，脑中自动补全剧情", type: TYPE_DRAMA }
        ] },
        { text: "你比较乐意听到别人用哪个词形容你？", options: [
            { text: "有活力、舒展自在、接地气", type: TYPE_DANCE },
            { text: "有乐感、善于倾听、情绪敏锐", type: TYPE_MUSIC },
            { text: "有趣、有感染力、很会讲故事", type: TYPE_DRAMA },
            { text: "有品味、细腻、能发现美", type: TYPE_VISUAL }
        ] }
    ];

    // ---------- 全局状态 ----------
    let currentView = 'welcome';
    let userAnswers = new Array(QUESTIONS.length).fill(null);
    let currentQIndex = 0;
    let finalScores = { [TYPE_VISUAL]:0, [TYPE_MUSIC]:0, [TYPE_DANCE]:0, [TYPE_DRAMA]:0 };

    const appContainer = document.getElementById('viewContainer');

    function render() {
        if (currentView === 'welcome') renderWelcome();
        else if (currentView === 'quiz') renderQuiz();
        else if (currentView === 'result') renderResult();
    }

    function renderWelcome() {
        appContainer.innerHTML = `
            <div class="content-pane">
                <div class="logo">🎨 艺术疗愈方式倾向测试</div>
                <div class="subhead">基于创造性艺术治疗体系 · 24道直觉探索 · 发现你的疗愈语言取向</div>
                <div class="welcome-icon">🖌️🎵💃🎭</div>
                <p style="margin-bottom: 1.2rem; line-height: 1.5;">每个人的内心都有一片独特的风景。本测试通过24个贴近日常的情境，评估您在<strong>视觉艺术、音乐、舞蹈/运动、戏剧</strong>四种艺术疗愈路径中的天然倾向。同时，若各维度分数接近，将为您推荐更具整合性的多模态艺术治疗。</p>
                <div class="feature-list">
                    🌱 24项温和选择 · 涵盖情绪表达、放松方式、社交互动<br>
                    🎯 基于专业艺术治疗理论框架 · 结果附详细疗愈机制与方法建议<br>
                    💡 新增“倾向平衡”识别 · 鼓励整合性探索
                </div>
                <button class="btn btn-primary" id="startQuizBtn" style="width:100%;">开始探索 ➤</button>
            </div>
        `;
        document.getElementById('startQuizBtn')?.addEventListener('click', () => {
            userAnswers.fill(null);
            currentQIndex = 0;
            finalScores = { [TYPE_VISUAL]:0, [TYPE_MUSIC]:0, [TYPE_DANCE]:0, [TYPE_DRAMA]:0 };
            currentView = 'quiz';
            render();
        });
    }

    // 自动跳转逻辑：选择答案后，保存并进行下一题或完成
    function handleOptionSelect(selectedType) {
        // 保存当前题的答案
        userAnswers[currentQIndex] = selectedType;

        // 判断是否是最后一题
        if (currentQIndex === QUESTIONS.length - 1) {
            // 直接计算结果并显示结果页
            computeAndShowResult();
        } else {
            // 不是最后一题，自动跳转到下一题
            currentQIndex++;
            renderQuiz();
        }
    }

    function renderQuiz() {
        const q = QUESTIONS[currentQIndex];
        const selectedType = userAnswers[currentQIndex];
        const progressPercent = (currentQIndex / QUESTIONS.length) * 100;

        let optionsHtml = '';
        const letters = ['A', 'B', 'C', 'D'];
        q.options.forEach((opt, idx) => {
            const isSelected = (selectedType === opt.type);
            const selectedClass = isSelected ? 'selected-option' : '';
            optionsHtml += `
                <div class="option-card ${selectedClass}" data-type="${opt.type}">
                    <div class="option-marker">${letters[idx]}</div>
                    <div class="option-text">${escapeHtml(opt.text)}</div>
                </div>
            `;
        });

        const html = `
            <div class="content-pane">
                <div class="progress-area">
                    <div class="progress-bar-bg"><div class="progress-fill" style="width:${progressPercent}%;"></div></div>
                    <div class="question-counter">第 ${currentQIndex+1} / ${QUESTIONS.length} 题</div>
                </div>
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="options-list" id="optionsList">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button class="btn btn-outline" id="prevBtn" ${currentQIndex === 0 ? 'disabled style="opacity:0.5"' : ''}>◀ 上一题</button>
                    <button class="btn btn-primary" id="nextBtn">${currentQIndex === QUESTIONS.length-1 ? '✨ 完成并查看结果' : '下一题 ▶'}</button>
                </div>
            </div>
        `;
        appContainer.innerHTML = html;

        // 为每个选项绑定点击事件，选中后自动跳转
        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', (e) => {
                e.stopPropagation();
                const chosenType = card.dataset.type;
                // 调用自动跳转逻辑
                handleOptionSelect(chosenType);
            });
        });

        // 手动上一题按钮
        const prevBtn = document.getElementById('prevBtn');
        if (prevBtn && currentQIndex > 0) {
            prevBtn.addEventListener('click', () => {
                if (currentQIndex > 0) {
                    currentQIndex--;
                    renderQuiz();
                }
            });
        }

        // 手动下一题按钮（保留，与自动跳转不冲突，但用户如果已经选过，可手动点击）
        const nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
            nextBtn.addEventListener('click', () => {
                if (!userAnswers[currentQIndex]) {
                    alert("请先选择一个选项～");
                    return;
                }
                if (currentQIndex === QUESTIONS.length - 1) {
                    computeAndShowResult();
                } else {
                    currentQIndex++;
                    renderQuiz();
                }
            });
        }
    }

    function computeAndShowResult() {
        // 确保所有题目都已答（理论上因自动跳转且不允许跳过，应该都已答，但做一次保险）
        if (userAnswers.some(ans => ans === null)) {
            alert("尚有未作答的题目，请返回完成。");
            const firstNull = userAnswers.findIndex(ans => ans === null);
            if (firstNull !== -1) currentQIndex = firstNull;
            renderQuiz();
            return;
        }

        const counts = { [TYPE_VISUAL]:0, [TYPE_MUSIC]:0, [TYPE_DANCE]:0, [TYPE_DRAMA]:0 };
        for (let ans of userAnswers) counts[ans]++;
        finalScores = counts;

        // 寻找最高分
        const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]);
        const highestScore = sorted[0][1];
        const topTypes = sorted.filter(([_,score]) => score === highestScore).map(([type]) => type);
        const secondScore = sorted.length > 1 ? sorted[1][1] : 0;
        const isNearlyBalanced = (highestScore - secondScore) <= 2;  // 差距≤2 视为倾向接近
        const hasExplicitTie = topTypes.length > 1;

        let primaryType = null;
        if (!hasExplicitTie && !isNearlyBalanced) {
            primaryType = topTypes[0];
        } else {
            primaryType = null;
        }

        const primaryDetail = primaryType ? DETAILED_MAP[primaryType] : null;
        const showIntegrated = (hasExplicitTie || isNearlyBalanced) || (primaryType === null);
        
        const total = QUESTIONS.length;
        const percentVisual = (counts[TYPE_VISUAL]/total)*100;
        const percentMusic = (counts[TYPE_MUSIC]/total)*100;
        const percentDance = (counts[TYPE_DANCE]/total)*100;
        const percentDrama = (counts[TYPE_DRAMA]/total)*100;

        let resultHtml = `
            <div class="content-pane">
                <div class="result-type">
                    <div class="result-badge">✨ 你的艺术疗愈倾向报告 ✨</div>
                    <div class="healing-icon">${primaryDetail ? primaryDetail.icon : INTEGRATED_DETAIL.icon}</div>
                    <div class="result-title">${primaryDetail ? primaryDetail.title : INTEGRATED_DETAIL.title}</div>
                    <div style="font-size:0.85rem; margin-top:6px; color:#8e7a6b;">基于24道直觉探索题</div>
                </div>
                <div class="result-desc">
                    <strong>🌱 你的倾向分布</strong><br>
                    <div style="margin:10px 0;">
                        <div style="display:flex; justify-content:space-between; font-size:0.8rem;"><span>🎨视觉 ${counts[TYPE_VISUAL]}</span><span>🎵音乐 ${counts[TYPE_MUSIC]}</span><span>💃舞蹈 ${counts[TYPE_DANCE]}</span><span>🎭戏剧 ${counts[TYPE_DRAMA]}</span></div>
                        <div style="display:flex; gap:4px; height:8px; margin-top:5px;">
                            <div style="width:${percentVisual}%; background:#b47c68; border-radius:12px;"></div>
                            <div style="width:${percentMusic}%; background:#c38e6e; border-radius:12px;"></div>
                            <div style="width:${percentDance}%; background:#d2a088; border-radius:12px;"></div>
                            <div style="width:${percentDrama}%; background:#e1b89c; border-radius:12px;"></div>
                        </div>
                    </div>
        `;

        if (primaryDetail && !showIntegrated) {
            resultHtml += `
                <strong>🎨 核心倾向解读</strong><br>
                ${primaryDetail.coreIdea}<br><br>
                <strong>📖 推荐疗愈方式</strong><br>
                ${primaryDetail.recommend}<br><br>
                <strong>🧰 典型方法举例</strong><br>
                ${primaryDetail.methods}<br><br>
                <strong>💆 疗愈机制</strong><br>
                ${primaryDetail.治愈机制}<br>
            `;
        } else {
            resultHtml += `
                <div class="integrated-note">
                    🌟 <strong>您的倾向分布非常平衡，整合/多模态艺术治疗尤其适合您！</strong><br>
                    ${INTEGRATED_DETAIL.coreIdea}<br><br>
                    <strong>🎯 整合疗愈推荐：</strong> ${INTEGRATED_DETAIL.recommend}<br>
                    <strong>📚 典型方法：</strong> ${INTEGRATED_DETAIL.methods}<br>
                    <strong>🧬 疗愈机制：</strong> ${INTEGRATED_DETAIL.治愈机制}
                </div>
            `;
            if (primaryDetail) {
                resultHtml += `<br><strong>✨ 同时，您的最高分倾向「${primaryDetail.title}」也值得关注：</strong><br>
                ${primaryDetail.coreIdea}<br>
                <strong>推荐方式：</strong> ${primaryDetail.recommend}<br>
                <strong>典型方法：</strong> ${primaryDetail.methods}<br>`;
            }
        }

        resultHtml += `
                <div style="margin-top:1rem; font-size:0.8rem; border-top:1px solid #e0cfc2; padding-top:0.8rem;">
                    📌 以上建议基于创造性艺术治疗体系（CATs），涵盖视觉艺术、音乐、舞蹈/运动、戏剧及整合性取向。如需专业艺术治疗服务，请咨询具备相关资质的治疗师。
                </div>
            </div>
            <div class="share-buttons">
                <button class="btn btn-outline" id="restartBtn">🔄 重新测试</button>
                <button class="btn btn-primary" id="shareBtn">📤 分享结果</button>
            </div>
        `;
        appContainer.innerHTML = resultHtml;
        document.getElementById('restartBtn')?.addEventListener('click', () => {
            userAnswers.fill(null);
            currentQIndex = 0;
            finalScores = { [TYPE_VISUAL]:0, [TYPE_MUSIC]:0, [TYPE_DANCE]:0, [TYPE_DRAMA]:0 };
            currentView = 'welcome';
            render();
        });
        document.getElementById('shareBtn')?.addEventListener('click', () => {
            let shareText = `🎨 我刚完成「艺术疗愈方式倾向测试」，我的倾向分布：视觉${counts[TYPE_VISUAL]}、音乐${counts[TYPE_MUSIC]}、舞蹈${counts[TYPE_DANCE]}、戏剧${counts[TYPE_DRAMA]}。`;
            if (primaryDetail && !showIntegrated) shareText += ` 主要倾向：${primaryDetail.title}。你也来测测你的疗愈语言吧！`;
            else shareText += ` 我的倾向较为平衡，适合整合性多模态艺术疗愈。来探索你的内在表达方式～`;
            if (navigator.share) navigator.share({ title: '艺术疗愈方式倾向测试', text: shareText }).catch(()=>alert("可复制文本分享："+shareText));
            else navigator.clipboard.writeText(shareText).then(()=>alert("结果已复制，分享给朋友吧✨")).catch(()=>alert(shareText));
        });
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    render();
</script>
</body>
</html>
